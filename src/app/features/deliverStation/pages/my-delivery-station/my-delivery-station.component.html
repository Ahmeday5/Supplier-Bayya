<div class="container-fluid mt-4 mb-5">
  <div class="row">
    <div class="col-12 p-0">
      <!-- LOADING -->
      @if (loadingTable) {
      <div class="row placeholder-glow mt-4">

        @for (p of placeholderArray; track p) {
        <div class="col-12 mb-3">
          <div class="profile-card p-3">

            <div class="d-flex align-items-center justify-content-between">

              <!-- ICON -->
              <div>
                <span class="placeholder rounded-circle" style="width:40px; height:40px;"></span>
              </div>

              <!-- CONTENT -->
              <div class="flex-grow-1 px-3">
                <h6 class="placeholder col-6 mb-2"></h6>
                <p class="placeholder col-4 mb-0"></p>
              </div>

              <!-- ACTIONS -->
              <div class="d-flex gap-2">
                <span class="placeholder" style="width:200px; height:30px;"></span>
                <span class="placeholder" style="width:200px; height:30px;"></span>
              </div>

            </div>

          </div>
        </div>
        }

      </div>
      }


      @if (alert) {
      <div class="alert alert-{{alert.type}}">{{alert.msg}}</div>
      }

      @if (stations && !loadingTable) {
      <div class="row">
        <div class="col-12 mb-4">
          <div class="d-flex justify-content-start">
            <button class="btn btn-add" routerLink="/AllDeliveryStation">
              <i class="fas fa-plus"></i>
              إضافة محطة جديدة
            </button>
          </div>
        </div>
        @for (station of stations; track station.id) {
        <div class="col-12">
          <!-- PROFILE CARD -->
          <div class="profile-card" [class.editing]="station.isEditing">
            <i class="fas fa-truck"></i>
            <div class="profile-content">
              <span *ngIf="!station.isEditing">{{station.deliveryStationName}}</span>
              <p *ngIf="!station.isEditing">الحد الأدني للطلب: {{station.minimumOrderPrice}} ج.م</p>

              <!-- INPUT + EDIT BUTTON -->
              <div *ngIf="station.isEditing" class="edit-section">
                <input type="number" [(ngModel)]="station.minimumOrderPrice" class="form-control form-control-sm"
                  min="1">
                <button class="btn btn-edit btn-sm" (click)="updateStation(station)"
                  [disabled]="isLoadingUpdate(station.id)">
                  <i *ngIf="isLoadingUpdate(station.id)" class="fas fa-spinner fa-spin"></i>
                  <i *ngIf="!isLoadingUpdate(station.id)" class="fas fa-pen"></i>
                </button>
              </div>
            </div>

            <!-- ACTIONS -->
            <div class="profile-actions">
              <button class="btn btn-sm btn-edit me-2" (click)="toggleEdit(station)">
                <i class="fas" [ngClass]="station.isEditing ? 'fa-times' : 'fa-pen'"></i>
              </button>
              <button class="btn btn-sm btn-delete" (click)="deleteStation(station)"
                [disabled]="isLoadingDelete(station.id)">
                <i *ngIf="isLoadingDelete(station.id)" class="fas fa-spinner fa-spin"></i>
                <i *ngIf="!isLoadingDelete(station.id)" class="fas fa-trash"></i>
              </button>
            </div>
          </div>

        </div>
        }
      </div>
      }
    </div>
  </div>
</div>
