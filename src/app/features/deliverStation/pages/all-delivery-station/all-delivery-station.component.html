<div class="container-fluid mt-4 mb-5">
  <div class="row">
    <div class="col-12 p-0">
      <!-- LOADING -->
      @if (loadingTable) {
      <div class="row g-3 mt-3 placeholder-glow">

        @for (p of placeholderArray; track p) {
        <div class="col-xl-4 col-lg-4 col-md-6 col-12">
          <div class="station-card p-3">

            <div class="d-flex align-items-center mb-2">
              <span class="placeholder rounded me-2" style="width:100px; height:20px;"></span>
              <span class="placeholder col-6"></span>
            </div>

            <div class="mt-2">
              <span class="placeholder col-4"></span>
            </div>

          </div>
        </div>
        }

      </div>
      }


      @if (alert) {
      <div class="alert alert-{{alert.type}} fw-bold">{{alert.msg}}</div>
      }

      @if (stations && !loadingTable) {
      <div class="row">
        <div class="col-12">
          <div class="d-flex justify-content-start mb-2">
            <button class="btn btn-add" (click)="addSelected()">
              <i class="fas fa-plus"></i>
              إضافة المحطات المحددة
            </button>
          </div>
        </div>
        @for (station of stations; track station.id) {
        <div class="col-xl-4 col-lg-4 col-md-6 col-12">
          <div class="station-card">
            <div>
              <input class="ms-2" type="checkbox" [(ngModel)]="selected[station.id]"
                (change)="toggleSelection(station, !!selected[station.id])">
              <span class="fw-bold">{{station.name}}</span>
            </div>
            <div *ngIf="selected[station.id] !== undefined">
              <input type="number" [(ngModel)]="selected[station.id]" min="1" class="form-control form-control-sm">
            </div>
            <div *ngIf="isLoading(station.id)">
              <i class="fas fa-spinner fa-spin"></i>
            </div>
          </div>
        </div>
        }
      </div>
      }

    </div>
  </div>
</div>
