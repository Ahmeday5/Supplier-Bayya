<div class="container-fluid mt-4 mb-5">
  <div class="row">
    <div class="col-xl-4 col-lg-5 col-md-6 col-sm-8 col-12">
      <div class="title d-flex align-items-center">
        <i class="fas fa-wallet"></i>
        <h2>محفظة بياع</h2>
      </div>
      <div class="notes d-flex justify-content-center mt-3">
        <p class="badge bg-infos">يمكنك إدارة معاملات محفظتك من هنا .</p>
      </div>
      @if (loading) {
      <div class="col-12 text-center mt-5">
        <span class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></span>
        <p class="mt-3 fw-bold">جاري تحميل الفئات...</p>
      </div>
      }
      @if (Indebtednes && !loading) {
      <div class="Indebtednes d-flex justify-content-between align-items-center mt-2 p-3">
        <h2>الرصيد المتاح</h2>
        <h3>{{Indebtednes.walletBalance}}</h3>
      </div>
      }
    </div>
  </div>
</div>
