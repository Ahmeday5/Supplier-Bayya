<header class="header border-bottom border-gray-200 shadow-sm sticky-top">
  <div class="container-fluid px-4 py-3">
    <div class="d-flex align-items-center justify-content-between">

      <div class="d-flex align-items-center gap-4">
        <button class="btn btn-link p-0 mobile-toggle d-lg-none" (click)="toggleSidebar()" type="button">
          <i class="fas fa-bars fs-4 text-muted"></i>
        </button>

        <div class="d-flex align-items-center gap-3">
          <img src="/assets/img/logo.png" alt="TheOne System Logo" class="header-logo">

          <div class="d-none d-sm-block">
            <h1 class="fs-5 fw-bold text-brand mb-0">Supplier Bayya</h1>
          </div>
        </div>
      </div>

      <div class="d-flex align-items-center gap-3">
        <div class="dropdown">
          <button class="btn btn-link p-0 dropdown-toggle d-flex align-items-center gap-3 text-decoration-none"
            type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="user-avatar rounded-circle d-flex align-items-center justify-content-center">
              <i class="fas fa-user text-white"></i>
            </div>

            <div class="d-none d-md-block text-end" *ngIf="userData$ | async as user">
              <div class="fw-medium text-dark">
                {{ user.name }}
              </div>
              <div class="text-muted small">
                {{ user.email }}
              </div>
            </div>
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
            <li><a class="dropdown-item fw-bold" routerLink="/MyProfile">الملف الشخصي</a></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li style="cursor: pointer;"><a class="dropdown-item text-danger fw-bold" (click)="logout()">تسجيل الخروج</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
